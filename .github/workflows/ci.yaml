name: Continuous Integration

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: developer
          POSTGRES_PASSWORD: supersecretpassword
          POSTGRES_DB: forumapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: ['22.x']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run migrations for test database
        env:
          PGHOST: localhost
          PGUSER: developer
          PGPASSWORD: supersecretpassword
          PGDATABASE: forumapi_test
          PGPORT: 5432
        run: npm run migrate:test up

      - name: Run tests (Unit, Integration, Functional)
        env:
          PGHOST: localhost
          PGUSER: developer
          PGPASSWORD: supersecretpassword
          PGDATABASE: forumapi_test
          PGPORT: 5432
          ACCESS_TOKEN_KEY: supersecretaccesskey
          REFRESH_TOKEN_KEY: supersecretrefreshkey
          ACCESS_TOKEN_AGE: 1800
        run: npm run test
